<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuberyMNL Voice Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 20px 16px 12px;
            border-bottom: 1px solid #1e1e30;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #d4a44a;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        /* Transcript */
        .transcript {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .transcript::-webkit-scrollbar { width: 4px; }
        .transcript::-webkit-scrollbar-track { background: transparent; }
        .transcript::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }
        .message.user {
            align-self: flex-end;
            background: #1a3a5c;
            color: #c8ddf0;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: #1e1e30;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        .message.interim {
            align-self: flex-end;
            background: #1a2a3c;
            color: #7a9ab8;
            font-style: italic;
            border-bottom-right-radius: 4px;
        }
        .message.error {
            align-self: center;
            background: #3a1a1a;
            color: #e08080;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Controls */
        .controls {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #1e1e30;
            background: #0a0a14;
        }

        .status {
            font-size: 13px;
            color: #666;
            height: 20px;
            transition: color 0.2s;
        }
        .status.listening { color: #e05050; }
        .status.thinking { color: #d4a44a; }
        .status.speaking { color: #50b050; }

        /* Mic button */
        .mic-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid #333;
            background: #1a1a2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }
        .mic-btn:hover { border-color: #555; background: #222240; }
        .mic-btn:active { transform: scale(0.95); }
        .mic-btn.listening {
            border-color: #e05050;
            background: #2a1a1a;
            box-shadow: 0 0 20px rgba(224, 80, 80, 0.3);
        }
        .mic-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Pulse ring animation */
        .mic-btn.listening::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #e05050;
            animation: pulse 1.5s ease-out infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Mic SVG icon */
        .mic-icon { width: 28px; height: 28px; fill: #888; transition: fill 0.2s; }
        .mic-btn.listening .mic-icon { fill: #e05050; }

        .bottom-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .btn-small {
            font-size: 12px;
            color: #555;
            background: none;
            border: 1px solid #2a2a3a;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-small:hover { color: #888; border-color: #444; }
        .shortcut-hint {
            font-size: 11px;
            color: #444;
        }
        .voice-select-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #555;
        }
        .voice-select-row select {
            background: #1a1a2e;
            color: #888;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            max-width: 220px;
            cursor: pointer;
        }
        .voice-select-row select:hover { border-color: #444; color: #aaa; }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #333;
            gap: 8px;
            padding: 40px;
            text-align: center;
        }
        .empty-state p { font-size: 14px; }
        .empty-state .hint { font-size: 12px; color: #2a2a3a; }

        /* Not supported banner */
        .not-supported {
            background: #3a1a1a;
            color: #e08080;
            padding: 16px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DUBERYMNL</h1>
        <p>Voice Assistant</p>
    </div>

    <div class="transcript" id="transcript">
        <div class="empty-state" id="empty-state">
            <p>Click the mic or press Space to start talking</p>
            <span class="hint">Ask about our sunglasses -- Bandits, Outback, or Rasta</span>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">Ready</div>

        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
            <svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </button>

        <div class="voice-select-row">
            <label for="voice-select">Voice:</label>
            <select id="voice-select"></select>
        </div>

        <div class="bottom-row">
            <button class="btn-small" onclick="resetConversation()">New Chat</button>
            <span class="shortcut-hint">Space = start / send</span>
        </div>
    </div>

    <script>
        // --- State ---
        let isListening = false;
        let isProcessing = false;
        let recognition = null;
        let interimEl = null;
        let fullTranscript = '';  // Accumulated text across recognition chunks

        const transcript = document.getElementById('transcript');
        const statusEl = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const emptyState = document.getElementById('empty-state');

        // --- Check browser support ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.querySelector('.controls').innerHTML =
                '<div class="not-supported">Speech recognition not supported. Please use Chrome or Edge.</div>';
        } else {
            initRecognition();
        }

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-PH';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                fullTranscript = '';
                micBtn.classList.add('listening');
                setStatus('Listening... (press Space again to send)', 'listening');
            };

            recognition.onresult = (event) => {
                // Ignore results after we've stopped listening
                if (!isListening) return;

                // Build full transcript from all results
                let final = '';
                let interim = '';
                for (let i = 0; i < event.results.length; i++) {
                    const result = event.results[i];
                    if (result.isFinal) {
                        final += result[0].transcript + ' ';
                    } else {
                        interim += result[0].transcript;
                    }
                }
                fullTranscript = final.trim();
                const display = (final + interim).trim();

                // Show what's being heard
                showInterim(display);
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    stopListening();
                    setStatus('Mic access denied -- check browser permissions', '');
                } else if (event.error === 'no-speech') {
                    // In continuous mode, no-speech is common during pauses -- ignore
                } else {
                    stopListening();
                    setStatus('Error: ' + event.error, '');
                }
            };

            recognition.onend = () => {
                // In continuous mode, Chrome may stop recognition after silence.
                // If user hasn't manually stopped, restart it to keep listening.
                if (isListening) {
                    try {
                        recognition.start();
                    } catch (e) {
                        // Already running or other issue -- ignore
                    }
                }
            };
        }

        // --- Mic toggle ---
        function toggleMic() {
            if (isProcessing) return;
            if (isListening) {
                // Stop and send whatever was captured
                sendAccumulated();
            } else {
                startListening();
            }
        }

        function startListening() {
            if (emptyState) {
                emptyState.remove();
            }
            fullTranscript = '';
            try {
                recognition.start();
            } catch (e) {
                console.error('Could not start recognition:', e);
            }
        }

        function sendAccumulated() {
            // Stop recognition
            isListening = false;
            micBtn.classList.remove('listening');
            try { recognition.stop(); } catch (e) { /* ignore */ }

            // Get final text from interim display (includes both final + last interim chunk)
            const text = interimEl ? interimEl.textContent.trim() : fullTranscript.trim();

            // Clean up interim
            if (interimEl) {
                interimEl.remove();
                interimEl = null;
            }

            if (text) {
                addMessage('user', text);
                sendToBot(text);
            } else {
                setStatus('Ready', '');
            }
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            try { recognition.stop(); } catch (e) { /* ignore */ }
            if (interimEl) {
                interimEl.remove();
                interimEl = null;
            }
        }

        // --- Show interim (partial) speech results ---
        function showInterim(text) {
            if (!interimEl) {
                interimEl = document.createElement('div');
                interimEl.className = 'message interim';
                transcript.appendChild(interimEl);
            }
            interimEl.textContent = text;
            scrollToBottom();
        }

        // --- Send to backend ---
        async function sendToBot(text) {
            isProcessing = true;
            micBtn.classList.add('disabled');
            setStatus('Thinking...', 'thinking');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                });

                if (!response.ok) throw new Error('Server error');

                const data = await response.json();
                addMessage('bot', data.reply);
                speak(data.reply);
            } catch (err) {
                console.error('Chat error:', err);
                addMessage('error', 'Could not reach the server. Is voice_server.py running?');
                setStatus('Ready', '');
                isProcessing = false;
                micBtn.classList.remove('disabled');
            }
        }

        // --- TTS ---
        const voiceSelect = document.getElementById('voice-select');
        let selectedVoice = null;

        function populateVoices() {
            const voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';

            // Filter to English voices, sort by name
            const englishVoices = voices.filter(v => v.lang.startsWith('en'));
            const otherVoices = voices.filter(v => !v.lang.startsWith('en'));

            if (englishVoices.length > 0) {
                const group = document.createElement('optgroup');
                group.label = 'English';
                englishVoices.forEach((v, i) => {
                    const opt = document.createElement('option');
                    opt.value = v.name;
                    opt.textContent = v.name + (v.localService ? '' : ' (online)');
                    group.appendChild(opt);
                });
                voiceSelect.appendChild(group);
            }

            if (otherVoices.length > 0) {
                const group = document.createElement('optgroup');
                group.label = 'Other';
                otherVoices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name;
                    opt.textContent = v.name;
                    group.appendChild(opt);
                });
                voiceSelect.appendChild(group);
            }

            // Restore previous selection or pick a good default
            const saved = localStorage.getItem('dubery-voice');
            if (saved && voices.find(v => v.name === saved)) {
                voiceSelect.value = saved;
            }
            updateSelectedVoice();
        }

        function updateSelectedVoice() {
            const voices = speechSynthesis.getVoices();
            selectedVoice = voices.find(v => v.name === voiceSelect.value) || null;
            localStorage.setItem('dubery-voice', voiceSelect.value);
        }

        voiceSelect.addEventListener('change', updateSelectedVoice);

        // Chrome loads voices async
        speechSynthesis.onvoiceschanged = populateVoices;
        populateVoices();

        function speak(text) {
            setStatus('Speaking...', 'speaking');

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            if (selectedVoice) utterance.voice = selectedVoice;

            utterance.onend = () => {
                setStatus('Ready', '');
                isProcessing = false;
                micBtn.classList.remove('disabled');
            };

            utterance.onerror = () => {
                setStatus('Ready', '');
                isProcessing = false;
                micBtn.classList.remove('disabled');
            };

            speechSynthesis.speak(utterance);
        }

        // --- UI helpers ---
        function addMessage(role, text) {
            const el = document.createElement('div');
            el.className = 'message ' + role;
            el.textContent = text;
            transcript.appendChild(el);
            scrollToBottom();
        }

        function scrollToBottom() {
            transcript.scrollTop = transcript.scrollHeight;
        }

        function setStatus(text, className) {
            statusEl.textContent = text;
            statusEl.className = 'status' + (className ? ' ' + className : '');
        }

        // --- Reset ---
        async function resetConversation() {
            try {
                await fetch('/reset', { method: 'POST' });
            } catch (e) { /* ignore */ }

            speechSynthesis.cancel();
            transcript.innerHTML =
                '<div class="empty-state" id="empty-state">' +
                '<p>Click the mic or press Space to start talking</p>' +
                '<span class="hint">Ask about our sunglasses -- Bandits, Outback, or Rasta</span>' +
                '</div>';
            setStatus('Ready', '');
            isProcessing = false;
            isListening = false;
            micBtn.classList.remove('listening', 'disabled');
        }

        // --- Keyboard shortcut: Space to toggle mic ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target === document.body) {
                e.preventDefault();
                toggleMic();
            }
        });
    </script>
</body>
</html>
