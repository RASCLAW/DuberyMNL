name: Story Rotation

on:
  schedule:
    # Every 3 hours: 12AM, 3AM, 6AM, 9AM, 12PM, 3PM, 6PM, 9PM UTC
    # = 8AM, 11AM, 2PM, 5PM, 8PM, 11PM, 2AM, 5AM PHT
    - cron: '0 */3 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Post story
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
        run: python tools/facebook/story_rotation.py
