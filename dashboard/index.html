<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuberyMNL</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--muted:#9ca3af;
  --accent:#1a1a2e;--accent-red:#e63946;--accent-green:#10b981;--accent-blue:#3b82f6;--accent-orange:#f59e0b;--accent-purple:#8b5cf6;
  --border:#e5e7eb;--sidebar-bg:#fafafa;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --r:14px;--r-sm:10px;--r-xs:8px;
  --font-display:'Space Grotesk',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* === SIDEBAR === */
.sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.sidebar .logo{font-family:var(--font-display);font-size:18px;font-weight:700;padding:8px 12px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.sidebar .logo .logo-d{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);color:var(--sub);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.nav-item.active{background:var(--card);color:var(--text);font-weight:600;box-shadow:var(--shadow)}
.nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sidebar .spacer{flex:1}
.help-box{background:linear-gradient(135deg,#1a1a2e,#2d2d44);color:#fff;border-radius:var(--r);padding:16px;font-size:12px;line-height:1.5}
.help-box .help-title{font-weight:600;margin-bottom:4px;font-size:13px}
.help-box button{margin-top:10px;background:#fff;color:#1a1a2e;border:none;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body)}

/* === MAIN === */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.greeting h1{font-family:var(--font-display);font-size:24px;font-weight:700}
.greeting p{color:var(--sub);font-size:13px;margin-top:2px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.top-icons{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:box-shadow .15s}
.icon-btn:hover{box-shadow:var(--shadow-md)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:var(--font-display)}

/* === STAT CARDS === */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;color:var(--sub);font-weight:500;display:flex;align-items:center;gap:6px}
.stat-dot{width:8px;height:8px;border-radius:50%}
.stat-value{font-family:var(--font-display);font-size:30px;font-weight:700;margin-top:6px}
.stat-value sub{font-size:13px;color:var(--sub);font-weight:500}
.stat-link{font-size:11px;color:var(--sub);margin-top:4px;cursor:pointer;transition:color .15s}
.stat-link:hover{color:var(--accent-blue)}

/* === PROGRESS SECTION === */
.progress-section{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{font-size:14px;font-weight:600}
.card-header select{border:1px solid var(--border);border-radius:var(--r-xs);padding:4px 10px;font-size:11px;color:var(--sub);background:var(--card);font-family:var(--font-body)}

/* Pipeline Breakdown */
.breakdown{display:flex;flex-direction:column;gap:10px}
.br-row{display:flex;align-items:center;gap:10px;font-size:13px}
.br-label{width:110px;color:var(--sub);font-size:12px}
.br-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.br-fill{height:100%;border-radius:4px;transition:width .5s ease}
.br-val{width:35px;text-align:right;font-family:var(--font-display);font-weight:600;font-size:13px}

/* AI Helper Card */
.ai-card{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
.ai-icon{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:var(--font-display)}
.ai-card h4{font-size:14px;font-weight:600}
.ai-card p{font-size:11px;color:var(--sub);line-height:1.5}
.ai-card .cta{background:var(--accent-green);color:#fff;border:none;padding:10px 20px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;font-family:var(--font-body);transition:opacity .15s}
.ai-card .cta:hover{opacity:0.9}

/* Coming Up Next */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-header h3{font-size:15px;font-weight:600}
.section-header .nav-arrows{display:flex;gap:8px}
.section-header .nav-arrows button{background:var(--card);border:1px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.coming-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.project-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.project-img{height:110px;background:linear-gradient(135deg,#1a1a2e,#2d2d44);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;text-align:center;padding:12px}
.project-body{padding:14px}
.project-body h4{font-size:13px;font-weight:600}
.project-body .project-sub{font-size:11px;color:var(--sub);margin-top:2px}
.project-body .project-progress{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.project-body .project-progress span{font-size:11px;color:var(--sub)}
.project-body .project-progress strong{font-family:var(--font-display);font-size:13px;font-weight:700}
.progress-bar{width:100%;height:4px;background:var(--bg);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:2px;transition:width .5s}
.project-footer{display:flex;justify-content:space-between;align-items:center;padding:0 14px 14px}
.project-footer span{font-size:10px;color:var(--sub)}
.badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
.badge-priority{background:#fee2e2;color:var(--accent-red)}
.badge-live{background:#d1fae5;color:var(--accent-green)}
.badge-pending{background:#fef3c7;color:var(--accent-orange)}
.badge-built{background:#ede9fe;color:var(--accent-purple)}

/* Angle Tags */
.angle-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.angle-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--sub)}

/* === RIGHT PANEL === */
.right-panel{width:300px;border-left:1px solid var(--border);background:var(--sidebar-bg);padding:24px 20px;overflow-y:auto;flex-shrink:0}

/* Calendar */
.calendar{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:20px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-header h4{font-size:13px;font-weight:600}
.cal-nav{display:flex;gap:6px}
.cal-nav button{background:none;border:none;cursor:pointer;font-size:13px;color:var(--sub)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:11px}
.cal-grid .day-label{color:var(--sub);font-weight:500;padding:4px}
.cal-grid .day{padding:6px;border-radius:8px;cursor:pointer;font-size:12px}
.cal-grid .day:hover{background:var(--bg)}
.cal-grid .day.today{background:var(--accent);color:#fff;font-weight:700}
.cal-grid .day.muted{color:#d1d5db}

/* Task Today */
.task-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:20px}
.task-card h4{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.task-img{width:100%;height:90px;background:linear-gradient(135deg,var(--accent-red),#ff6b6b);border-radius:var(--r-sm);margin-bottom:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}
.task-meta .task-name{font-size:13px;font-weight:600}
.task-meta .task-sub{font-size:11px;color:var(--sub);margin-top:2px}
.task-progress{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.task-progress span{font-size:11px;color:var(--sub)}
.task-progress strong{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--accent-red)}

/* Detail Task */
.detail-task{margin-top:16px}
.detail-task h4{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between}
.detail-task h4 span{font-size:11px;color:var(--sub);font-weight:400}
.task-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.task-list li{display:flex;align-items:center;gap:10px;font-size:12px;padding:8px 10px;border-radius:var(--r-xs);background:var(--bg)}
.task-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.task-list li.done .task-num{background:var(--accent);color:#fff}
.task-list li.done{color:var(--sub);text-decoration:line-through}

/* Metric Row */
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.metric-row:last-child{border-bottom:none}
.metric-name{font-size:12px;color:var(--sub)}
.metric-val{font-family:var(--font-display);font-size:13px;font-weight:600}

/* Section - Tab Content */
.tab-content{display:none}
.tab-content.active{display:block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;transition:all .2s}
.review-card img{border-radius:var(--r-sm);margin-bottom:8px}
.review-prompt{font-size:11px;color:var(--sub);line-height:1.4;margin:6px 0}
.review-actions{display:flex;gap:6px;margin-top:8px}
.rev-btn{padding:6px 14px;border-radius:var(--r-xs);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);font-family:var(--font-body);transition:all .15s}
.rev-btn:hover{box-shadow:var(--shadow)}
.rev-approve{color:var(--accent-green);border-color:var(--accent-green)}
.rev-approve:hover{background:var(--accent-green);color:#fff}
.rev-reject{color:var(--accent-red);border-color:var(--accent-red)}
.rev-reject:hover{background:var(--accent-red);color:#fff}
.rev-retry{color:var(--accent-blue);border-color:var(--accent-blue)}
.rev-retry:hover{background:var(--accent-blue);color:#fff}

/* Creative Tab - Image First */
.creative-split{display:grid;grid-template-columns:360px 1fr;gap:20px;min-height:calc(100vh - 120px)}
.creative-left{display:flex;flex-direction:column;gap:12px}
.creative-right{display:flex;flex-direction:column;gap:12px}
.preset-chips{display:flex;flex-wrap:wrap;gap:8px}
.preset-chip{padding:8px 16px;border:2px solid var(--border);border-radius:20px;background:var(--card);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.preset-chip:hover{border-color:var(--accent);color:var(--text)}
.preset-chip.active{border-color:var(--accent-blue);background:var(--accent-blue);color:#fff}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.product-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;cursor:pointer;transition:all .15s}
.product-card:hover{border-color:var(--accent-blue);box-shadow:var(--shadow)}
.product-card.active{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.product-thumb{height:70px;border-radius:var(--r-xs);margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff}
.product-name{font-size:12px;font-weight:600}
.product-sub{font-size:10px;color:var(--sub)}
.option-chips{display:flex;gap:8px}
.option-chip{padding:7px 14px;border:2px solid var(--border);border-radius:var(--r-xs);background:var(--card);color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.option-chip:hover{border-color:var(--accent);color:var(--text)}
.option-chip.active{border-color:var(--accent-blue);background:var(--accent-blue);color:#fff}
.gen-main-btn{width:100%;padding:14px;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;font-family:var(--font-display);cursor:pointer;transition:all .2s}
.gen-main-btn.disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.gen-main-btn.ready{background:#16a34a;color:#fff;box-shadow:0 4px 12px rgba(22,163,74,.3)}
.gen-main-btn.ready:hover{background:#15803d}
.gen-main-btn.loading{background:var(--accent-blue);color:#fff;cursor:wait}
.gen-status-dots{display:flex;gap:16px;justify-content:center;margin-top:10px}
.gen-dot{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.gen-dot .dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.gen-dot.ok .dot{background:var(--accent-green)}
.gen-dot.ok{color:var(--accent-green)}
.review-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.review-empty .icon{font-size:40px;margin-bottom:12px}
.review-result{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.review-result.approved{border-color:var(--accent-green)}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.result-header h4{font-size:14px;font-weight:600}
.result-header .meta{font-size:11px;color:var(--sub)}
.result-body{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.result-image img{width:100%;display:block;border-radius:var(--r-sm)}
.caption-section{background:var(--card);border:2px solid var(--accent-green);border-radius:var(--r);padding:16px;margin-bottom:12px}
.caption-section h4{font-size:14px;font-weight:600;color:var(--accent-green);margin-bottom:10px}
.caption-text{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--r-xs);font-family:var(--font-body);font-size:14px;resize:vertical;min-height:60px;background:#f0fdf4;line-height:1.5}
.caption-note{font-size:11px;color:var(--sub);margin-top:6px}
.history-item{display:flex;gap:12px;padding:10px;border-radius:var(--r-xs);background:var(--bg);margin-bottom:8px;align-items:center}
.history-thumb{width:50px;height:50px;border-radius:var(--r-xs);object-fit:cover}
.history-info{flex:1}
.history-info .h-title{font-size:12px;font-weight:600}
.history-info .h-sub{font-size:10px;color:var(--sub)}
@keyframes progress{0%{width:5%}50%{width:70%}100%{width:95%}}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo"><div class="logo-d">D</div> DuberyMNL</div>
  <button class="nav-item active" onclick="switchTab('overview',this)"><span class="nav-icon">&#9673;</span> Overview</button>
  <button class="nav-item" onclick="switchTab('creative',this)"><span class="nav-icon">&#9998;</span> Creative</button>
  <button class="nav-item" onclick="switchTab('marketing',this)"><span class="nav-icon">&#9733;</span> Marketing</button>
  <button class="nav-item" onclick="switchTab('crm',this)"><span class="nav-icon">&#9829;</span> CRM</button>
  <div class="spacer"></div>
  <div class="help-box">
    <div class="help-title">Need help?</div>
    Run a pipeline command or generate new content from Claude Code.
    <button onclick="alert('Open Claude Code session')">Run Pipeline</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="top-bar">
    <div class="greeting">
      <h1 id="greeting-text">Hey RA!</h1>
      <p id="greeting-sub">Your DuberyMNL command center is ready.</p>
    </div>
    <div class="top-icons">
      <div class="icon-btn" title="Refresh data" onclick="loadData()">&#8635;</div>
      <div class="icon-btn" title="Notifications">&#128276;</div>
      <div class="avatar">RA</div>
    </div>
  </div>

  <!-- OVERVIEW TAB -->
  <div class="tab-content active" id="tab-overview"></div>

  <!-- CREATIVE TAB -->
  <div class="tab-content" id="tab-creative"></div>

  <!-- MARKETING TAB -->
  <div class="tab-content" id="tab-marketing"></div>

  <!-- CRM TAB -->
  <div class="tab-content" id="tab-crm"></div>
</main>

<!-- RIGHT PANEL -->
<aside class="right-panel">
  <div class="calendar" id="calendar"></div>
  <div class="task-card" id="task-today"></div>
  <div class="detail-task" id="detail-task"></div>
</aside>

<script>
let D = null;
const rendered = {};

// === NAV ===
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const rp = document.querySelector('.right-panel');
  if (rp) rp.style.display = id === 'overview' ? '' : 'none';
  ensureRendered(id);
}

function ensureRendered(id) {
  if (rendered[id]) return;
  const r = { overview: renderOverview, creative: renderCreative, marketing: renderMarketing, crm: renderCRM };
  if (r[id]) { r[id](); rendered[id] = true; }
}

// === UTILITIES ===
function fmt(n) { return n == null ? '--' : 'P' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
function fmtN(n) { return n == null ? '--' : Number(n).toLocaleString(); }
function pct(n) { return n == null ? '--' : Number(n).toFixed(1) + '%'; }

// === CALENDAR ===
function renderCalendar() {
  const el = document.getElementById('calendar');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['S','M','T','W','T','F','S'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  let h = `<div class="cal-header"><h4>${months[month]} ${year}</h4><div class="cal-nav"><button>&#9664;</button><button>&#9654;</button></div></div>`;
  h += '<div class="cal-grid">';
  days.forEach(d => { h += `<div class="day-label">${d}</div>`; });
  for (let i = firstDay - 1; i >= 0; i--) {
    h += `<div class="day muted">${prevDays - i}</div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    h += `<div class="day${d === today ? ' today' : ''}">${d}</div>`;
  }
  const remaining = 42 - (firstDay + daysInMonth);
  for (let d = 1; d <= remaining; d++) {
    h += `<div class="day muted">${d}</div>`;
  }
  h += '</div>';
  el.innerHTML = h;
}

// === RIGHT PANEL ===
function renderRightPanel() {
  renderCalendar();

  const el = document.getElementById('task-today');
  const km = D.overview.key_metrics;
  const ph = D.overview.pipeline_health;
  const total = D.creative.summary.total;
  const approved = ph.wf2_image.approved;
  const pctDone = total ? Math.round((approved / total) * 100) : 0;

  let h = `<h4>Pipeline Progress <span style="font-size:11px;color:var(--sub)">&#8943;</span></h4>`;
  h += `<div class="task-img">DuberyMNL Content Pipeline</div>`;
  h += `<div class="task-meta"><div class="task-name">Image Generation</div><div class="task-sub">${approved} of ${total} images approved</div></div>`;
  h += `<div class="task-progress"><span>Progress</span><strong>${pctDone}%</strong></div>`;
  h += `<div class="progress-bar"><div class="fill" style="width:${pctDone}%;background:var(--accent-red)"></div></div>`;
  el.innerHTML = h;

function selectStyle(key) { CS.style = CS.style === key ? null : key; document.querySelectorAll('.preset-chip').forEach(el => el.classList.toggle('active', el.dataset.key === CS.style)); checkGenerateReady(); }
function selectProduct(key) { CS.product = CS.product === key ? null : key; document.querySelectorAll('.product-card').forEach(el => el.classList.toggle('active', el.dataset.key === CS.product)); checkGenerateReady(); }

function checkGenerateReady() {
  const btn = document.getElementById('gen-main-btn');

function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

async function generateCreative() {
  if (!CS.style || !CS.product) return;
  const preset = STYLE_PRESETS[CS.style];
  const product = PRODUCTS[CS.product];
  const prompt = getRandomItem(preset.prompts).replace(/\{product\}/g, product.name);
  const btn = document.getElementById('gen-main-btn');
  const stream = document.getElementById('review-stream');

  btn.className = 'gen-main-btn loading'; btn.textContent = 'Generating...'; btn.disabled = true;
  const empty = stream.querySelector('.review-empty'); if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = 'review-result'; card.id = 'loading-card';
  card.innerHTML = `<div class="result-header"><h4>Generating...</h4><span class="meta">${preset.label} / ${product.name} / ${CS.ratio}</span></div>
    <div style="padding:40px;text-align:center;background:var(--bg);border-radius:var(--r-sm)">
      <div style="font-size:28px;animation:spin 1s linear infinite">&#9881;</div>
      <div style="font-size:12px;color:var(--sub);margin-top:10px">Sending to kie.ai... polling every 4s</div>
      <div style="margin-top:12px;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--accent-blue);border-radius:3px;animation:progress 2s ease-in-out infinite"></div></div>
    </div>`;
  stream.prepend(card);

  try {
    const result = await apiCall('/api/generate', { method: 'POST', body: JSON.stringify({ prompt, aspect_ratio: CS.ratio }) });
    creditsUsed++; localStorage.setItem('kieCredits', creditsUsed); updateCredits();
    CS.taskId = result.task_id;
    pollCreativeGen(result.task_id, prompt, preset, product);
  } catch (e) {
    card.innerHTML = `<div class="result-header"><h4 style="color:var(--accent-red)">Failed</h4></div>
      <div style="padding:20px;text-align:center;color:var(--accent-red);font-size:13px">${e.message}</div>
      <div style="margin-top:10px;text-align:center"><button onclick="this.closest('.review-result').remove()" class="rev-btn rev-reject">Dismiss</button></div>`;
    btn.className = 'gen-main-btn ready'; btn.textContent = 'GENERATE IMAGE'; btn.disabled = false;
  }
}

function pollCreativeGen(taskId, prompt, preset, product) {
  activePolls[taskId] = true;
  const interval = setInterval(async () => {
    try {
      const s = await apiCall(`/api/generate/status/${taskId}`);
      if (s.status === 'completed' && s.image_url) {
        clearInterval(interval); delete activePolls[taskId];
        CS.imageUrl = s.image_url; CS.imageApproved = false;
        showImageResult(s.image_url, prompt, preset, product);
      } else if (s.status === 'failed') {
        clearInterval(interval); delete activePolls[taskId];
        const card = document.getElementById('loading-card');
        const btn = document.getElementById('gen-main-btn');
        if (card) card.innerHTML = `<div class="result-header"><h4 style="color:var(--accent-red)">Failed</h4></div><div style="padding:20px;text-align:center;color:var(--accent-red);font-size:13px">${s.error||'Unknown error'}</div><div style="margin-top:10px;text-align:center"><button onclick="this.closest('.review-result').remove()" class="rev-btn rev-reject">Dismiss</button></div>`;
        if (btn) { btn.className = 'gen-main-btn ready'; btn.textContent = 'GENERATE IMAGE'; btn.disabled = false; }
      }
    } catch (e) {}
  }, 4000);
}

    <button id="gen-main-btn" class="gen-main-btn ${ready?'ready':'disabled'}" onclick="generateCreative()" ${!ready?'disabled':''}>GENERATE IMAGE</button>

      <div class="gen-dot${CS.style?' ok':''}" data-field="style"><div class="dot"></div> Style</div>
      <div class="gen-dot${CS.product?' ok':''}" data-field="product"><div class="dot"></div> Product</div>
      <div class="gen-dot ok" data-field="ratio"><div class="dot"></div> Ratio</div>
      <div class="gen-dot ok" data-field="line"><div class="dot"></div> Line</div>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:10px;color:var(--muted)">Credits used: <strong id="credit-count">${creditsUsed}</strong></div>
  </div>`;

  h += '</div>'; // end left

  // === RIGHT PANEL ===
  h += '<div class="creative-right">';

  h += `<div class="card" style="flex:1">
    <div class="card-header"><h3>Review Stream</h3><span style="font-size:11px;color:var(--sub)">Newest first</span></div>
    <div id="review-stream"><div class="review-empty"><div class="icon">&#9998;</div><p>Select a style and product, then click Generate.<br>Your image will appear here for review.</p></div></div>
  </div>`;

  h += `<div class="card">
    <div class="card-header"><h3>History</h3><span style="font-size:11px;color:var(--sub)">${CS.history.length} items</span></div>
    <div id="history-section" style="max-height:200px;overflow-y:auto"></div>
  </div>`;

  h += '</div>'; // end right
  h += '</div>'; // end split

  // Pipeline Bar
  h += `<div class="card" style="padding:14px;margin-top:12px">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center">
      <div><div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--accent-orange)" id="pipe-queue">${cr.queue.length}</div><div style="font-size:10px;color:var(--sub);margin-top:2px">Queue</div></div>
      <div><div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--accent-blue)" id="pipe-generating">${Object.keys(activePolls).length}</div><div style="font-size:10px;color:var(--sub);margin-top:2px">Generating</div></div>
      <div><div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--accent-green)" id="pipe-approved">${cr.approved.length}</div><div style="font-size:10px;color:var(--sub);margin-top:2px">Approved</div></div>
      <div><div style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--accent-purple)" id="pipe-ready">${D.marketing.ready_to_distribute.length}</div><div style="font-size:10px;color:var(--sub);margin-top:2px">Ready</div></div>
    </div>
  </div>`;

  el.innerHTML = h;
  renderHistory(); updateCredits();
}

// === MARKETING (stub) ===
function renderMarketing() {
  const el = document.getElementById('tab-marketing');
  const mk = D.marketing;
  const ads = mk.ads;
  let h = '';

  if (ads.campaign && ads.campaign.name) {
    h += '<div class="stats-row">';
    h += `<div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--accent-red)"></span> Spend</div><div class="stat-value" style="font-size:22px">${fmt(ads.campaign.total_spend)}</div></div>`;
    h += `<div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--accent-green)"></span> CTR</div><div class="stat-value" style="font-size:22px">${pct(ads.campaign.ctr)}</div></div>`;
    h += `<div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--accent-blue)"></span> LPV</div><div class="stat-value" style="font-size:22px">${fmtN(ads.campaign.landing_page_views)}</div></div>`;
    h += '</div>';

    // Top Creatives
    if (ads.top_creatives && ads.top_creatives.length) {
      h += '<div class="card"><div class="card-header"><h3>Top Creatives by CTR</h3></div>';
      ads.top_creatives.slice(0, 5).forEach((cr, i) => {
        h += `<div class="metric-row">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--accent-red);width:24px">#${i + 1}</span>
            <div><div style="font-size:12px;font-weight:600">${cr.ad_name}</div><div style="font-size:10px;color:var(--sub)">Spend: ${fmt(cr.spend)} / ${fmtN(cr.clicks)} clicks</div></div>
          </div>
          <span class="metric-val" style="color:var(--accent-green)">${pct(cr.ctr)}</span>
        </div>`;
      });
      h += '</div>';
    }

    // Ad Sets
    if (ads.adsets.length) {
      h += '<div class="card"><div class="card-header"><h3>Ad Sets</h3></div>';
      ads.adsets.forEach(as => {
        h += `<div style="background:var(--bg);border-radius:var(--r-sm);padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">${as.name}</span><span style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--accent-green)">${pct(as.ctr)}</span></div>
          <div style="display:flex;gap:16px;margin-top:6px;font-size:11px;color:var(--sub)"><span>Spend: ${fmt(as.spend)}</span><span>Clicks: ${fmtN(as.clicks)}</span><span>LPV: ${fmtN(as.landing_page_views)}</span></div>
        </div>`;
      });
      h += '</div>';
    }

    // Ready to distribute
    h += `<div class="card"><div class="card-header"><h3>Ready to Distribute</h3><span style="font-size:12px;color:var(--sub)">${mk.ready_to_distribute.length} creatives</span></div>`;
    if (mk.ready_to_distribute.length === 0) {
      h += '<p style="color:var(--muted);font-size:12px;text-align:center;padding:16px 0">All content distributed.</p>';
    } else {
      mk.ready_to_distribute.slice(0, 5).forEach(item => {
        h += `<div class="metric-row"><div><span style="font-size:12px;font-weight:600">#${item.id}</span> <span style="font-size:11px;color:var(--sub)">${item.product_ref || ''}</span></div><div style="display:flex;gap:6px"><button style="padding:4px 10px;border:1px solid var(--accent-red);border-radius:6px;background:none;color:var(--accent-red);font-size:10px;font-weight:600;cursor:pointer">Ad</button><button style="padding:4px 10px;border:1px solid var(--accent-blue);border-radius:6px;background:none;color:var(--accent-blue);font-size:10px;font-weight:600;cursor:pointer">Organic</button></div></div>`;
      });
    }
    h += '</div>';
  } else {
    h += '<div class="card"><p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">No ad data yet. Run pull_insights.py to fetch performance.</p></div>';
  }

  el.innerHTML = h;
}

// === CRM (stub) ===
function renderCRM() {
  const el = document.getElementById('tab-crm');
  const crm = D.crm;
  let h = '';

  h += '<div class="stats-row" style="grid-template-columns:1fr 1fr">';
  h += `<div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--accent-green)"></span> Revenue</div><div class="stat-value" style="font-size:22px">${fmt(crm.revenue.total)}</div></div>`;
  h += `<div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--accent-blue)"></span> Orders</div><div class="stat-value" style="font-size:22px">${crm.orders.length}</div></div>`;
  h += '</div>';

  h += '<div class="card"><div class="card-header"><h3>Orders</h3></div>';
  if (crm.orders.length) {
    crm.orders.forEach(o => {
      h += `<div class="metric-row"><span class="metric-name">${o.name || 'Order'}</span><span class="metric-val">${fmt(o.total)}</span></div>`;
    });
  } else {
    h += '<p style="color:var(--muted);font-size:12px;text-align:center;padding:24px 0">No orders yet. They\'ll appear here once the landing page form starts receiving submissions.</p>';
  }
  h += '</div>';

  h += '<div class="card"><div class="card-header"><h3>Messenger Chatbot (WF4)</h3></div>';
  h += `<div class="metric-row"><span class="metric-name">Status</span><span class="badge badge-${crm.chatbot.deployed ? 'live' : 'built'}">${crm.chatbot.deployed ? 'Deployed' : 'Built'}</span></div>`;
  h += `<div class="metric-row"><span class="metric-name">Conversations Today</span><span class="metric-val">${crm.chatbot.conversations_today}</span></div>`;
  h += '</div>';

  el.innerHTML = h;
}

// === GREETING ===
function updateGreeting() {
  const h = new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila', hour: 'numeric', hour12: true });
  const hour = parseInt(new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila', hour: 'numeric', hour12: false }));
  let greet = 'Hey RA!';
  if (hour >= 5 && hour < 12) greet = 'Good morning, RA!';
  else if (hour >= 12 && hour < 18) greet = 'Good afternoon, RA!';
  else if (hour >= 18 && hour < 22) greet = 'Good evening, RA!';
  else greet = 'Hey RA! Still up?';
  document.getElementById('greeting-text').textContent = greet;
}

// === LOAD DATA ===
async function loadData() {
  try {
    // Try FastAPI first (localhost:8000), fall back to static JSON
    let res;
    try {
      res = await fetch(API + '/api/dashboard-data', { signal: AbortSignal.timeout(2000) });
    } catch (_) {}
    if (!res || !res.ok) res = await fetch('dubery-dashboard-data.json');
    if (!res.ok) res = await fetch('../.tmp/dubery-dashboard-data.json');
    D = await res.json();

    updateGreeting();
    document.getElementById('greeting-sub').textContent =
      D.creative.summary.total + ' content pieces / ' +
      fmt(D.marketing.ads.campaign.total_spend || 0) + ' ad spend / ' +
      D.creative.summary.approval_rate + '% approval';

    // Reset renders
    Object.keys(rendered).forEach(k => delete rendered[k]);
    renderOverview();
    rendered['overview'] = true;
    renderRightPanel();
  } catch (e) {
    document.getElementById('tab-overview').innerHTML =
      '<div class="card"><p style="color:var(--accent-red);font-size:13px">Error loading data: ' + e.message + '</p></div>';
  }
}

// === INIT ===
loadData();
</script>
</body>
</html>
